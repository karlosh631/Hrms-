# ── Build settings ────────────────────────────────────────────────────────────
[build]
  publish = "."
  # No build command needed – this is a pure static site (HTML/CSS/JS).

[build.environment]
  NODE_VERSION = "20"

# ── SPA catch-all redirect (must be LAST) ─────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security & performance headers ────────────────────────────────────────────

# HTML pages: no-cache so the browser always checks for a new version
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control            = "public, max-age=0, must-revalidate"
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    X-XSS-Protection         = "1; mode=block"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy  = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none';"

# CSS & JS: long-lived cache (Netlify rewrites URLs with content hash on deploy)
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static assets (images, icons, manifests)
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

